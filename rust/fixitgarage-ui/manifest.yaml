# xbuild packaging config for FixItGarage (Slint / NativeActivity)
android:
  manifest:
    package: org.fixitgarage.app
    sdk:
      min_sdk_version: 26
      target_sdk_version: 33
    uses_permission:
      - name: android.permission.INTERNET
      - name: android.permission.CAMERA
      - name: android.permission.POST_NOTIFICATIONS
    application:
      label: FixItGarage
      has_code: false
